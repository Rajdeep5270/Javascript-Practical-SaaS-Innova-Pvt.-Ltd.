<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display and Search a List of Users in a Table Using External API</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header></header>

    <main>
        <section class="table-view py">
            <div class="container">
                <div class="table-title">
                    <h2>API Calling</h2>
                </div>
                <div class="searching">
                    <input type="text" id="search" placeholder="Search Here...">
                </div>
                <div class="table-content">
                    <table>
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Street</th>
                                <th>City</th>
                                <th>Zipcode</th>
                            </tr>
                        </thead>
                        <tbody id="tBody">

                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>


    <!-- main js   -->
    <script src="script.js" type="text/javascript"></script>

</body>

</html>
