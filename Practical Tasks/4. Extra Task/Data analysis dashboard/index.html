<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analysis Dashboard</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content text-center">
                    <h2>Admin Panel</h2>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- stats section  -->
        <section class="stats py">
            <div class="container">
                <div class="row">
                    <div class="w-3">
                        <div class="stats-content text-center">
                            <h2>Total Admin</h2>
                            <p id="totalAdmin"></p>
                        </div>
                    </div>
                    <div class="w-3">
                        <div class="stats-content text-center">
                            <h2>Total Moderator</h2>
                            <p id="totalModerator"></p>
                        </div>
                    </div>
                    <div class="w-3">
                        <div class="stats-content text-center">
                            <h2>Total User</h2>
                            <p id="totalUser"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- display metrics  -->
        <section class="metrics py">
            <div class="container">
                <div class="metrics-content">
                    <label for="">Filter Data
                        <select name="" id="" onchange="displayMatrics(event)">
                            <option value="age">Age</option>
                            <option value="height">Height</option>
                            <option value="weight">Weight</option>
                        </select>
                    </label>

                    <div class="row">
                        <div class="w-4">
                            <div class="stats-content">
                                <h2>Average</h2>
                                <p id="average"></p>
                            </div>
                        </div>

                        <div class="w-4">
                            <div class="stats-content">
                                <h2>Minium</h2>
                                <p id="minimum"></p>
                            </div>
                        </div>

                        <div class="w-4">
                            <div class="stats-content">
                                <h2>Maximum</h2>
                                <p id="maximum"></p>
                            </div>
                        </div>

                        <div class="w-4">
                            <div class="stats-content">
                                <h2>Total</h2>
                                <p id="sum"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- graph section  -->
        <section class="graph py">
            <div class="container">
                <div class="graph-content">
                    <label for="filterData">Filter Data
                        <select name="" id="filterData">
                            <option value="role">Select</option>
                            <option value="role">Roles</option>
                            <option value="eyeColor">Eyecolor</option>
                            <option value="bloodGroup">Blood Group</option>
                        </select>
                    </label>

                    <label for="filterData">Chart Type
                        <select name="" id="chartType">
                            <option value="bar">Select</option>
                            <option value="bar">Bar</option>
                            <option value="pie">Pie</option>
                        </select>
                    </label>

                    <button id="makeGraph" class="py">Make Graph</button>
                    <div>
                        <canvas id="displayGraph" style="max-height: 600px; max-width: 100%;"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- chart.js  -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>

    <!-- main javascript  -->
    <script src="script.js" type="text/javascript"></script>
</body>

</html>
