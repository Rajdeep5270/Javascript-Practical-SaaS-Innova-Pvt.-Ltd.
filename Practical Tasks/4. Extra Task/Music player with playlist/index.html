<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Songs</title>

    <!-- bootstrap css  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <!-- navbar section  -->
        <section class="navbar py-5 bg-dark text-light">
            <div class="container">
                <div class="navbar-content">
                    <h2 class="fw-bold">Gotofy</h2>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- add song section  -->
        <section class="add py-5">
            <div class="container">
                <div class="add-content">
                    <div class="add-title text-center">
                        <h2 class="fs-1 fw-bold">Add Song</h2>
                    </div>
                    <form action="" enctype="multipart/form-data"
                        class="py-5 d-flex justify-content-center align-items-center flex-column">
                        <div class="mb-3">
                            <label class="form-label">Song name</label>
                            <input type="text" id="songName" class="form-control" placeholder="Enter song name here...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Singer name</label>
                            <input type="text" id="singerName" class="form-control"
                                placeholder="Enter singer name here...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Song file</label>
                            <input type="file" id="songFile" class="form-control" accept="audio/*">
                        </div>
                        <div class="mb-3">
                            <button type="submit" class="btn btn-success"
                                onclick="addSongToPlaylist(event)">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <!-- view song section  -->
        <section class="view py-5">
            <div class="container">
                <div class="view-content">
                    <div class="view-title text-center">
                        <h2 class="fs-1 fw-bold">Playlist</h2>
                    </div>
                    <table class="table table-dark table-striped mt-5">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Name</th>
                                <th>Singer</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tBody">

                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- off canvas  -->
        <div class="offcanvas offcanvas-end" data-bs-backdrop="false" data-bs-scroll="true" tabindex="-1"
            id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasExampleLabel">Music</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <h2 id="displaySongName">Song Name</h2>
                <h2 id="displaySingerName">Singer Name</h2>
                <audio>
                    <source src="" id="displayAudio" controls>
                </audio>
            </div>
        </div>
    </main>

    <footer></footer>

    <!-- bootstrap cdn  -->
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- main script  -->
    <script src="script.js"></script>
</body>

</html>
