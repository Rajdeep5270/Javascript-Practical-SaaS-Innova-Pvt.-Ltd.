<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>

    <!-- main css -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <!-- navbar section  -->
        <section class="navbar py">
            <div class="container">
                <div class="navbar-content text-center">
                    <h2 id="heading">Quiz Test</h2>
                    <h3 id="result"></h3>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- questions section  -->
        <section class="question py">
            <div class="container">
                <div class="question-content text-center">
                    <div class="question-title d-flex justify-center align-center" id="questionDisplay">

                    </div>

                    <div class="question-option" id="optionDisplay">

                    </div>

                    <div class="submit-btn" id="buttonDisplay">
                        <button type="submit" id="submitBtn" style="margin: 0 10px; display: none;"
                            onclick="displayResultFunc()">Submit</button>
                        <button type="button" id="nextBtn" onclick="nextQuestion()"
                            style="margin: 0 10px;">Next</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- current score and current question display area  -->
        <section class="live">
            <div class="container">
                <div id="currentScore" style="margin: 0 0 20px 0;">
                    <p>Right : 0 Wrong : 0</p>
                </div>
                <div id="liveQuestions" class="live-content">

                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main js  -->
    <script src="script.js" type="text/javascript"></script>
</body>

</html>
