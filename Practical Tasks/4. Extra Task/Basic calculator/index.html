<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator App</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content">
                    <h2>Calculator</h2>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- calci section  -->
        <section class="calci py text-center">
            <div class="container">
                <div class="calci-content">
                    <input type="number" id="num1">
                    <input type="number" id="num2">
                </div>
                <div class="calci-button">
                    <button id="addition">+</button>
                    <button id="subtraction">-</button>
                    <button id="multiplication">*</button>
                    <button id="division">/</button>
                </div>
            </div>
        </section>

        <!-- result section  -->
        <section class="result">
            <div class="container">
                <div class="result-content d-flex justify-center align-center">
                    <p>Answer :
                    <p id="displayResult"></p>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main js -->
    <script src="script.js"></script>
</body>

</html>
