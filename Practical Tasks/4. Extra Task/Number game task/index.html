<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the number game</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content text-center">
                    <h2>Number Guess Game</h2>
                    <h3>(1 - 100)</h3>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- guess section  -->
        <section class="guess py">
            <div class="container">
                <div class="guess-content">
                    <input type="tel" id="inputNumber" placeholder="Try your luck here...">
                    <button id="retry">Retry</button>
                    <br>
                    <button id="checkGuessBtn" onclick="checkNumber()">Check Guess</button>
                    <h2 id="result"></h2>
                    <h3 id="displayAttempts"></h3>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>


    <!-- main script  -->
    <script src="script.js" type="text/javascript"></script>
</body>

</html>
