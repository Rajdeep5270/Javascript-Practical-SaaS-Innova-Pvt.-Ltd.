<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic form builder</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content">
                    <h2>Dynamic Form Builder</h2>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- form sectin  -->
        <section class="form py text-center">
            <div class="container">
                <div class="form-content" id="displayInputFields">
                    <select name="" id="formInputType">
                        <option value="text">text</option>
                        <option value="number">number</option>
                        <option value="radio">radio</option>
                    </select>
                </div>

                <div>
                    <button id="inputAddField">Add Input Field</button>
                </div>
            </div>
        </section>

        <!-- dynamic form sectin  -->
        <section class="dynamic py">
            <div class="container">
                <h2>Dynamic Form</h2>
                <div id="dynamicForm" class="dynamic-content text-center">

                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main javascript  -->
    <script src="script.js" type="text/javascript"></script>
</body>

</html>
