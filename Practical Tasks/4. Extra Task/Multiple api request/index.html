<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Api Request</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content text-center">
                    <h2>Multiple Api Request</h2>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- display api output section  -->
        <section class="display-users text-center py">
            <div class="container">
                <div class="users-content">
                    <table border="1">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Gender</th>
                                <th>Phone</th>
                                <th>Website</th>
                                <th>Role</th>
                            </tr>
                        </thead>
                        <tbody id="displayOutput">

                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main js  -->
    <script src="script.js" type="text/javascript"></script>
</body>

</html>
