<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do drag & drop</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content text-center">
                    <h2>To-Do App</h2>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- add to-do section  -->
        <section class="to-do py">
            <div class="container">
                <div class="to-do-content d-flex justify-center align-center">
                    <input type="text" id="textInput" placeholder="Enter your task here...">
                    <button onclick="addData(event)">Add Task</button>
                </div>
            </div>
        </section>

        <!-- view tasks section  -->
        <section class="view-task py">
            <div class="container">
                <div class="view-content text-center">
                    <h2>View Task</h2>

                    <table>
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Task</th>
                            </tr>
                        </thead>
                        <tbody id="tBody" ondrop="dropHandler(event)" ondragover="dragOverHandler(event)">

                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main javascript  -->
    <script src="script.js" type="text/javascript"></script>
</body>

</html>
