<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count-down Timer</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <section class="navbar">
            <div class="container">
                <div class="navbar-content text-center">
                    <h2>Count Down Timer</h2>
                </div>
            </div>
        </section>
    </header>

    <main>
        <section class="count-down">
            <div class="container">
                <div class="count-down-content text-center">
                    <input type="number" id="inputSec">
                    <br>
                    <button id="startBtn" type="button">Start Count Down</button>
                    <h4 id="displayOutput"></h4>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main js  -->
    <script src="script.js"></script>
</body>

</html>
