<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validiation</title>

    <!-- main css file  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <main>
        <!-- form-validiation section  -->
        <section class="form-validiation py">
            <div class="container">
                <div class="form-content">
                    <div class="form-title text-center">
                        <h2>Form-Validiation</h2>
                        <h2 id="finalOutput" style="color: green;"></h2>
                    </div>
                    <div class="form-info d-flex justify-center align-center">
                        <form onsubmit="onFormSubmit(event)">
                            <div class="input-fields">
                                <p>Name</p>
                                <input id="name">
                                <div id="nameError"></div>
                            </div>

                            <div class="input-fields">
                                <p>E-Mail</p>
                                <input type="text" id="email">
                                <div id="emailError"></div>
                            </div>

                            <div class="input-fields">
                                <p>Password</p>
                                <input type="text" id="password">
                                <div id="passwordError"></div>
                            </div>

                            <div class="input-fields">
                                <p>Confirm Password</p>
                                <input type="text" id="cPassword">
                                <div id="confPasswordError"></div>
                            </div>

                            <div class="input-fields">
                                <button type="submit" id="submitBtn">Submit</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- main js file   -->
    <script src="script.js" type="text/javascript"></script>
</body>

</html>
