<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content d-flex justify-between align-center">
                    <div class="navbar-title">
                        <h2>To-Do Application</h2>
                    </div>

                    <nav>
                        <ul class="d-flex">
                            <li><a href="index.html">Add Task</a></li>
                            <li><a href="view-task.html">View Task</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </section>
    </header>

    <main>
        <section class="add-task-form py">
            <div class="container">
                <div class="add-content">
                    <div class="add-title text-center">
                        <h2>Update Task</h2>
                    </div>
                    <div class="add-info text-center">
                        <input type="text" id="taskInput">
                        <button id="taskAddBtn" onclick="updateEditedTask()">Update</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main edit script js  -->
    <script src="edit-script.js" type="text/javascript"></script>
</body>

</html>
