<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>

    <!-- main css  -->
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <section class="navbar">
            <div class="container">
                <div class="navbar-content d-flex justify-between align-center">
                    <div class="navbar-title">
                        <h2>To-Do Application</h2>
                    </div>

                    <nav>
                        <ul class="d-flex">
                            <li><a href="index.html">Add Task</a></li>
                            <li><a href="view-task.html" id="viewTaskBtn">View Task</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </section>
    </header>

    <main>
        <!-- view task section  -->
        <section class="view-task py">
            <div class="container">
                <div class="view-content">
                    <div class="view-title text-center">
                        <h2>View Task</h2>
                    </div>
                    <table>
                        <thead>
                            <tr class="d-flex justify-between">
                                <th>No.</th>
                                <th>Task</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tBody">

                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- main js  -->
    <script src="view-script.js" type="text/javascript"></script>
</body>

</html>
